name: Actualizar resultados Mundial 2026

on:
  schedule:
    # Cada 2 horas (hora UTC). Durante el Mundial mantiene los marcadores al dia.
    - cron: "0 */2 * * *"
  workflow_dispatch: {}   # boton para correrlo a mano desde GitHub

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Bajar el repositorio
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Actualizar marcadores
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: python scripts/update_results.py

      - name: Guardar cambios (si los hay)
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/matches.json
          if git diff --staged --quiet; then
            echo "Sin cambios en los resultados."
          else
            git commit -m "Actualizar resultados (automatico)"
            git push
          fi
